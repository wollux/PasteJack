name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERT }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "build" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          rm certificate.p12

      - name: Build and Sign App Bundle
        run: ./Scripts/build.sh

      - name: Create DMG
        run: |
          brew install create-dmg
          ./Scripts/create-dmg.sh

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: ./Scripts/notarize.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/PasteJack-*.dmg
          generate_release_notes: true

      - name: Update Homebrew Tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_FILE="$(ls .build/PasteJack-*.dmg)"
          SHA256="$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')"

          echo "==> Updating homebrew-tap: version=${VERSION} sha256=${SHA256}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/wollux/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/pastejack.rb << 'CASK_EOF'
          cask "pastejack" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/wollux/PasteJack/releases/download/v#{version}/PasteJack-#{version}.dmg"
            name "PasteJack"
            desc "Paste clipboard contents as simulated keystrokes — bypass paste-blocking"
            homepage "https://github.com/wollux/PasteJack"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :sonoma"

            app "PasteJack.app"

            zap trash: [
              "~/Library/Preferences/com.pastejack.app.plist",
              "~/Library/Application Support/PasteJack",
            ]

            caveats <<~EOS
              PasteJack requires Accessibility permission to simulate keystrokes.

              After installation, go to:
                System Settings > Privacy & Security > Accessibility
              and enable PasteJack.

              Default hotkey: Ctrl+Shift+V
            EOS
          end
          CASK_EOF

          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/" Casks/pastejack.rb
          sed -i '' "s/SHA256_PLACEHOLDER/${SHA256}/" Casks/pastejack.rb

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' Casks/pastejack.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/pastejack.rb
          git commit -m "Update PasteJack to ${VERSION}"
          git push
