name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERT }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "build" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          rm certificate.p12

      - name: Build and Sign App Bundle
        run: ./Scripts/build.sh

      - name: Create DMG
        run: |
          brew install create-dmg
          ./Scripts/create-dmg.sh

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: ./Scripts/notarize.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/PasteJack-*.dmg
          generate_release_notes: true
